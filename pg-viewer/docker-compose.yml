version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/postgis_db
    depends_on:
      db:
        condition: service_healthy

  seeder:
    build: .
    command: python seed_data/seed.py
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/postgis_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./seed_data:/app/seed_data

volumes:
  postgres_data:
