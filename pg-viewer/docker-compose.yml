version: '3.8'

services:
  db:
    image: kartoza/postgis:15-3.3
    container_name: db_pgviewer
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: "PGPASSWORD=${POSTGRES_PASS} pg_isready -h ${POSTGRES_HOST} -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
      interval: 30s
      timeout: 290s
      retries: 30
    env_file:
      - .env

  app:
    build: .
    container_name: app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASS}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  seeder:
    container_name: seeder
    build: .
    command: python seed_data/seed.py
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASS}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./seed_data:/app/seed_data

volumes:
  postgres_data:
